name: 🚀 Deploy to Vercel

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python (for static build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🏗️ Build static HTML from notebooks
        run: |
          echo "Checking for notebooks to build..."
          if [ -d "notebooks" ] && ls notebooks/*.ipynb 1> /dev/null 2>&1; then
            python server.py build
            echo "✅ Static build complete"
          else
            echo "⚠️  No notebooks found — using pre-built HTML files"
          fi

      - name: 🌐 Deploy Preview (Pull Request)
        if: github.event_name == 'pull_request'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 🚀 Deploy Production (main branch)
        if: github.event_name == 'push'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
