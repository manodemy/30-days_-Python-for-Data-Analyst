name: 🚀 Deploy to Vercel

on:
  push:
    branches:
      - main
      - master
      - v2
  pull_request:
    branches:
      - main
      - master
      - v2
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python (for static build)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🏗️ Build static HTML from notebooks
        run: |
          echo "Checking for notebooks to build..."
          if [ -d "notebooks" ] && ls notebooks/*.ipynb 1> /dev/null 2>&1; then
            python server.py build
            echo "✅ Static build complete"
          else
            echo "⚠️  No notebooks found — using pre-built HTML files"
          fi

      - name: 📦 Install Vercel CLI (latest)
        run: npm install -g vercel@latest

      - name: 🔗 Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build with Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: ⚡ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 'latest'

      - name: ⚡ Deploy Supabase Edge Functions
        run: |
          supabase functions deploy verify-payment --project-ref erqoyvbuhmkyvcqgwcbz --no-verify-jwt
          supabase functions deploy create-order --project-ref erqoyvbuhmkyvcqgwcbz --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

# Trigger run with new Supabase token

