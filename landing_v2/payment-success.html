<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful! &mdash; Manodemy</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--void);
      padding: 2rem;
    }
    .status-card {
      background: var(--surface);
      border: 1px solid rgba(0, 230, 246, 0.25);
      border-top-color: rgba(255,255,255,0.15);
      border-bottom-color: rgba(0,0,0,0.5);
      border-radius: 16px;
      padding: 3rem 2rem;
      text-align: center;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .status-icon {
      font-size: 64px;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
      display: inline-block;
    }
    .status-card h1 {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 32px;
      color: var(--cyan);
      margin-bottom: 12px;
    }
    .status-card p {
      font-size: 15px;
      color: var(--ink-dim);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .order-id {
      font-family: var(--font-data);
      font-size: 12px;
      color: var(--ink-muted);
      background: var(--base);
      border: 1px solid var(--rim-strong);
      padding: 8px 16px;
      border-radius: 6px;
      margin-bottom: 2rem;
      display: inline-block;
    }
    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  </style>
</head>
<body>
  <div class="status-card">
    <div class="status-icon" aria-hidden="true">&#x1F389;</div>
    <h1>Payment Successful!</h1>
    <p>Welcome to the <strong>30-Day Python Data Analytics Masterclass</strong>. Your premium lifetime access has been fully activated.</p>
    <div class="order-id" id="orderId">Locating Transaction Details...</div>
    
    <a href="../home.html" class="btn-gold btn-gold--filled btn-action">&#x1F680; Start Your Learning Path Now</a>
    <p style="font-size: 12px; color: var(--ink-muted); margin-top: 1.5rem;">An invoice confirmation has been sent to your email.</p>
  </div>

  <script src="../supabase.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const oid = params.get('order_id');
    if (oid) {
      document.getElementById('orderId').textContent = 'Order ID: ' + oid;
    } else {
      document.getElementById('orderId').textContent = 'Lifetime Access Key Active';
    }

    // Verify enrollment with Supabase
    const SUPA_URL = 'https://gvhnwmuyrwissgkumeif.supabase.co';
    const SUPA_KEY = 'sb_publishable_x0gyXkcrCSaxSG23Zyi7qA__v1sBgOq';
    try {
      const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
      sb.rpc('check_enrollment', { p_course_id: 'python-30day' }).then(({ data }) => {
        if (data === true) {
          localStorage.setItem('manodemy_auth', 'true');
          localStorage.setItem('manodemy_enrolled', 'true');
        }
      }).catch(e => console.error(e));
    } catch(err) {
      console.warn("Supabase initialization bypassed safely:", err);
    }
  </script>
</body>
</html>
