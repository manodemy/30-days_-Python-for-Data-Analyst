<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Reset Password &mdash; Manodemy</title>

  

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  

  <link rel="stylesheet" href="styles.css">

  <style>

    body {

      display: flex;

      align-items: center;

      justify-content: center;

      min-height: 100vh;

      background: var(--void);

      padding: 2rem;

    }

    .reset-card {

      background: var(--surface);

      border: 1px solid rgba(0, 230, 246, 0.25);

      border-top-color: rgba(255,255,255,0.15);

      border-bottom-color: rgba(0,0,0,0.5);

      border-radius: 16px;

      padding: 3rem 2rem;

      max-width: 440px;

      width: 100%;

      box-shadow: 0 20px 40px rgba(0,0,0,0.5);

    }

    .reset-card h1 {

      font-family: var(--font-display);

      font-weight: 800;

      font-size: 32px;

      color: var(--cyan);

      margin-bottom: 8px;

      text-align: center;

    }

    .reset-card p {

      font-size: 14px;

      color: var(--ink-dim);

      text-align: center;

      margin-bottom: 2rem;

    }

    .reset-form {

      display: flex;

      flex-direction: column;

      gap: 12px;

    }

    .reset-input {

      background: var(--base);

      border: 1px solid var(--rim-strong);

      padding: 14px 16px;

      border-radius: 8px;

      font-size: 14px;

      color: var(--ink);

      width: 100%;

      outline: none;

      transition: all 200ms var(--ease);

    }

    .reset-input:focus {

      border-color: var(--cyan);

      background: var(--elevated);

      box-shadow: 0 0 10px rgba(0, 230, 246, 0.15);

    }

    .btn-action {

      margin-top: 1rem;

      width: 100%;

      justify-content: center;

    }

    .auth-msg {

      padding: 10px 14px;

      border-radius: 6px;

      font-size: 13px;

      margin-bottom: 1.5rem;

      display: none;

      line-height: 1.5;

    }

    .back-btn {

      display: block;

      text-align: center;

      font-family: var(--font-data);

      font-size: 12px;

      color: var(--ink-dim);

      margin-top: 1.5rem;

    }

    .back-btn:hover {

      color: var(--cyan);

    }

  </style>

</head>

<body>

  <div class="reset-card">

    <h1>Set Password</h1>

    <p>Please enter your secure new password credentials.</p>

    

    <div class="auth-msg" id="authMsg"></div>

    

    <form class="reset-form" id="resetForm">

      <input type="password" id="newPassword" class="reset-input" placeholder="New Password (min 6 characters)" required minlength="6">

      <input type="password" id="confirmPassword" class="reset-input" placeholder="Confirm Password" required minlength="6">

      <button type="submit" class="btn-gold btn-gold--filled btn-action" id="btnReset">Update Password</button>

    </form>

    

    <a href="index.html" class="back-btn">&#x2190; Return to Login</a>

  </div>



  <script src="../supabase.js"></script>

  <script>

    const SUPABASE_URL = 'https://erqoyvbuhmkyvcqgwcbz.supabase.co';

    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVycW95dmJ1aG1reXZjcWd3Y2J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODk1MTIsImV4cCI6MjA5NDk2NTUxMn0.9UnIfq8xMrKANPPTtoOADKH-NJ_it9HDp7xrJL4FXtw';

    let sb;

    try {

      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    } catch(err) {

      console.warn("Supabase init deferred:", err);

    }



    const form = document.getElementById('resetForm');

    const btn = document.getElementById('btnReset');

    const msgEl = document.getElementById('authMsg');



    const showMsg = (msg, type) => {

      msgEl.textContent = msg;

      msgEl.style.display = 'block';

      if (type === 'error') {

        msgEl.style.background = 'rgba(248,113,113,0.1)';

        msgEl.style.color = 'var(--rose)';

        msgEl.style.border = '1px solid rgba(248,113,113,0.2)';

      } else if (type === 'success') {

        msgEl.style.background = 'rgba(45,212,191,0.1)';

        msgEl.style.color = 'var(--emerald)';

        msgEl.style.border = '1px solid rgba(45,212,191,0.2)';

      } else {

        msgEl.style.background = 'rgba(201,168,76,0.1)';

        msgEl.style.color = 'var(--gold)';

        msgEl.style.border = '1px solid rgba(201,168,76,0.2)';

      }

    };



    if (sb) {

      sb.auth.onAuthStateChange((event, session) => {

        if (event === 'PASSWORD_RECOVERY') {

          showMsg('Magic verification link verified. Please fill in your new password below.', 'info');

        }

      });

    }



    form.addEventListener('submit', async (e) => {

      e.preventDefault();

      const p1 = document.getElementById('newPassword').value;

      const p2 = document.getElementById('confirmPassword').value;



      if (p1 !== p2) {

        showMsg("Entered passwords do not match. Please verify.", "error");

        return;

      }



      if (!sb) {

        showMsg("Connection lost. Please reload.", "error");

        return;

      }



      btn.disabled = true;

      btn.textContent = 'Saving Changes...';



      const { error } = await sb.auth.updateUser({ password: p1 });



      if (error) {

        showMsg(error.message, "error");

        btn.disabled = false;

        btn.textContent = 'Update Password';

      } else {

        showMsg("Password updated successfully! Directing you back to home...", "success");

        setTimeout(() => { window.location.href = 'index.html'; }, 2000);

      }

    });

  </script>

</body>

</html>
