<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SQL Order Flow</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a0f1e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 32px 16px;
  font-family: 'Inter', sans-serif;
}

/* ═══════════════════════════════════════
   CONTAINER
   ═══════════════════════════════════════ */
.sql-order-flow {
  width: 100%;
  max-width: 680px;
}

.flow-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: start;
}

/* ═══════════════════════════════════════
   COLUMN
   ═══════════════════════════════════════ */
.flow-col {
  background: rgba(15, 23, 42, 0.8);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 16px;
  overflow: hidden;
  backdrop-filter: blur(12px);
}

.flow-col-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}

.flow-col-header.visible {
  opacity: 1;
  transform: translateY(0);
}

.flow-col-header--blue {
  background: linear-gradient(135deg, #1d4ed8, #2563eb);
  color: #fff;
}

.flow-col-header--teal {
  background: linear-gradient(135deg, #0d9488, #10b981);
  color: #fff;
}

.col-header-inner {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.col-header-inner span {
  display: block;
}

.col-header-sub {
  font-size: 0.6rem;
  opacity: 0.75;
  font-weight: 500;
}

.col-icon {
  font-size: 1.1rem;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   NODES AREA
   ═══════════════════════════════════════ */
.flow-nodes {
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ═══════════════════════════════════════
   FLOW NODE
   ═══════════════════════════════════════ */
.flow-node {
  width: 100%;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 10px;
  padding: 11px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  color: #cbd5e1;
  text-align: center;
  letter-spacing: 0.04em;

  /* Hidden initially */
  opacity: 0;
  transform: translateY(-10px);
  transition: opacity 0.4s ease, transform 0.4s ease,
              box-shadow 0.3s ease, border-color 0.3s ease, color 0.3s ease;
}

.flow-node.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Dashed node (SELECT in writing order) */
.flow-node--dashed {
  border-style: dashed;
  border-color: rgba(255, 255, 255, 0.22);
  color: #94a3b8;
}

/* Highlighted: blue */
.flow-node--hl-blue {
  border-color: #3b82f6;
  color: #93c5fd;
  background: rgba(59, 130, 246, 0.08);
}

.flow-node--hl-blue.visible {
  animation: glowBlue 2.4s ease-in-out infinite;
  animation-delay: 0.2s;
}

/* Highlighted: green */
.flow-node--hl-green {
  border-color: #10b981;
  color: #6ee7b7;
  background: rgba(16, 185, 129, 0.08);
}

.flow-node--hl-green.visible {
  animation: glowGreen 2.4s ease-in-out infinite;
  animation-delay: 0.4s;
}

/* ═══════════════════════════════════════
   CONNECTOR (SVG ARROW)
   ═══════════════════════════════════════ */
.flow-connector {
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 32px;
  position: relative;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.flow-connector.visible {
  opacity: 1;
}

.flow-connector svg {
  width: 22px;
  height: 32px;
  overflow: visible;
}

.connector-line {
  stroke: #475569;
  stroke-width: 1.5;
  stroke-linecap: round;
  fill: none;
  stroke-dasharray: 18;
  stroke-dashoffset: 18;
  transition: stroke-dashoffset 0.45s ease;
}

.flow-connector.visible .connector-line {
  stroke-dashoffset: 0;
}

/* After all nodes appear: marching ants on connector lines */
.flow-col.flow-active .connector-line {
  animation: marchingAnts 0.6s linear infinite;
  stroke: #38bdf8;
}

.flow-col--exec.flow-active .connector-line {
  stroke: #34d399;
}

.connector-circle {
  fill: rgba(15, 23, 42, 0.95);
  stroke: #475569;
  stroke-width: 1.5;
  transition: stroke 0.3s ease;
}

.flow-col.flow-active .connector-circle {
  stroke: #38bdf8;
}
.flow-col--exec.flow-active .connector-circle {
  stroke: #34d399;
}

.connector-arrow {
  fill: #475569;
  transition: fill 0.3s ease;
}

.flow-col.flow-active .connector-arrow {
  fill: #38bdf8;
}
.flow-col--exec.flow-active .connector-arrow {
  fill: #34d399;
}

/* ═══════════════════════════════════════
   REPLAY BUTTON
   ═══════════════════════════════════════ */
.flow-replay {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.flow-replay.visible {
  opacity: 1;
}

.replay-btn {
  background: rgba(56, 189, 248, 0.1);
  border: 1px solid rgba(56, 189, 248, 0.3);
  border-radius: 8px;
  color: #38bdf8;
  font-family: 'Inter', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 8px 20px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.2s ease;
}

.replay-btn:hover {
  background: rgba(56, 189, 248, 0.2);
  border-color: rgba(56, 189, 248, 0.6);
  transform: translateY(-1px);
}

/* ═══════════════════════════════════════
   KEYFRAMES
   ═══════════════════════════════════════ */
@keyframes marchingAnts {
  from { stroke-dashoffset: 12; }
  to   { stroke-dashoffset: 0;  }
}

@keyframes glowBlue {
  0%, 100% {
    box-shadow: 0 0 8px rgba(59, 130, 246, 0.3), inset 0 0 8px rgba(59, 130, 246, 0.05);
    border-color: #3b82f6;
  }
  50% {
    box-shadow: 0 0 22px rgba(59, 130, 246, 0.7), 0 0 44px rgba(59, 130, 246, 0.2), inset 0 0 12px rgba(59, 130, 246, 0.1);
    border-color: #60a5fa;
  }
}

@keyframes glowGreen {
  0%, 100% {
    box-shadow: 0 0 8px rgba(16, 185, 129, 0.3), inset 0 0 8px rgba(16, 185, 129, 0.05);
    border-color: #10b981;
  }
  50% {
    box-shadow: 0 0 22px rgba(16, 185, 129, 0.7), 0 0 44px rgba(16, 185, 129, 0.2), inset 0 0 12px rgba(16, 185, 129, 0.1);
    border-color: #34d399;
  }
}

/* ═══════════════════════════════════════
   MOBILE
   ═══════════════════════════════════════ */
@media (max-width: 540px) {
  .flow-wrap {
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .flow-node {
    font-size: 0.65rem;
    padding: 9px 10px;
  }
  .flow-col-header {
    font-size: 0.65rem;
  }
}
</style>
</head>
<body>

<div class="sql-order-flow" id="sqlOrderFlow">
  <div class="flow-wrap">

    <!-- ═══ LEFT: WRITING ORDER ═══ -->
    <div class="flow-col flow-col--write" id="writeCol">
      <div class="flow-col-header flow-col-header--blue" id="writeHeader">
        <span class="col-icon">📄</span>
        <div class="col-header-inner">
          <span>WRITING ORDER</span>
          <span class="col-header-sub">(SYNTAX)</span>
        </div>
      </div>
      <div class="flow-nodes" id="writeNodes">

        <div class="flow-node flow-node--dashed" data-seq="0">SELECT</div>

        <div class="flow-connector" data-seq="0">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="1">FROM</div>

        <div class="flow-connector" data-seq="1">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="2">WHERE</div>

        <div class="flow-connector" data-seq="2">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="3">GROUP BY</div>

        <div class="flow-connector" data-seq="3">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="4">HAVING</div>

        <div class="flow-connector" data-seq="4">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="5">ORDER BY</div>

        <div class="flow-connector" data-seq="5">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="6">LIMIT</div>

      </div>
    </div>

    <!-- ═══ RIGHT: EXECUTION ORDER ═══ -->
    <div class="flow-col flow-col--exec" id="execCol">
      <div class="flow-col-header flow-col-header--teal" id="execHeader">
        <span class="col-icon">⚙️</span>
        <div class="col-header-inner">
          <span>EXECUTION ORDER</span>
          <span class="col-header-sub">(LOGICAL)</span>
        </div>
      </div>
      <div class="flow-nodes" id="execNodes">

        <div class="flow-node" data-seq="0">1. FROM / JOIN</div>

        <div class="flow-connector" data-seq="0">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="1">2. WHERE</div>

        <div class="flow-connector" data-seq="1">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="2">3. GROUP BY</div>

        <div class="flow-connector" data-seq="2">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="3">4. HAVING</div>

        <div class="flow-connector" data-seq="3">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node flow-node--hl-blue" data-seq="4">5. SELECT <span style="font-size:0.6rem;opacity:0.85;">(alias defined)</span></div>

        <div class="flow-connector" data-seq="4">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="5">6. DISTINCT</div>

        <div class="flow-connector" data-seq="5">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node flow-node--hl-green" data-seq="6">7. ORDER BY <span style="font-size:0.6rem;opacity:0.85;">(alias ok)</span></div>

        <div class="flow-connector" data-seq="6">
          <svg viewBox="0 0 22 32" xmlns="http://www.w3.org/2000/svg">
            <line x1="11" y1="0" x2="11" y2="18" class="connector-line"/>
            <circle cx="11" cy="24" r="6" class="connector-circle"/>
            <polyline points="8.5,22 11,26 13.5,22" class="connector-arrow" fill="none" stroke="#475569" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="flow-node" data-seq="7">8. LIMIT</div>

      </div>
    </div>

  </div><!-- /flow-wrap -->

  <div class="flow-replay" id="flowReplay">
    <button class="replay-btn" id="replayBtn">↺ Replay Animation</button>
  </div>
</div><!-- /sql-order-flow -->

<script>
(function() {
  const STEP_DELAY  = 260;  // ms between each node reveal
  const CONN_OFFSET = 130;  // ms after a node before its connector appears

  function getNodes(colId)       { return Array.from(document.querySelectorAll(`#${colId} .flow-node`)); }
  function getConnectors(colId)  { return Array.from(document.querySelectorAll(`#${colId} .flow-connector`)); }

  function resetAll() {
    ['writeHeader','execHeader'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('visible');
    });
    ['writeCol','execCol'].forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove('flow-active');
    });
    ['writeNodes','execNodes'].forEach(id => {
      getNodes(id).forEach(n => n.classList.remove('visible'));
      getConnectors(id).forEach(c => c.classList.remove('visible'));
    });
    document.getElementById('flowReplay').classList.remove('visible');
  }

  function runAnimation() {
    resetAll();

    // Headers appear first
    setTimeout(() => {
      document.getElementById('writeHeader').classList.add('visible');
      document.getElementById('execHeader').classList.add('visible');
    }, 100);

    // Animate LEFT column nodes (7 nodes, 6 connectors)
    const writeNodes = getNodes('writeNodes');
    const writeConns = getConnectors('writeNodes');
    writeNodes.forEach((node, i) => {
      const t = 400 + i * (STEP_DELAY + CONN_OFFSET);
      setTimeout(() => node.classList.add('visible'), t);
      if (writeConns[i]) {
        setTimeout(() => writeConns[i].classList.add('visible'), t + STEP_DELAY);
      }
    });

    // Animate RIGHT column nodes (8 nodes, 7 connectors) — slight offset
    const execNodes = getNodes('execNodes');
    const execConns = getConnectors('execNodes');
    execNodes.forEach((node, i) => {
      const t = 550 + i * (STEP_DELAY + CONN_OFFSET);
      setTimeout(() => node.classList.add('visible'), t);
      if (execConns[i]) {
        setTimeout(() => execConns[i].classList.add('visible'), t + STEP_DELAY);
      }
    });

    // After all nodes revealed → enable marching ants
    const totalTime = 550 + (execNodes.length - 1) * (STEP_DELAY + CONN_OFFSET) + STEP_DELAY + 300;
    setTimeout(() => {
      document.getElementById('writeCol').classList.add('flow-active');
      document.getElementById('execCol').classList.add('flow-active');
    }, totalTime);

    // Show replay button
    setTimeout(() => {
      document.getElementById('flowReplay').classList.add('visible');
    }, totalTime + 200);
  }

  // IntersectionObserver — trigger when diagram enters viewport
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        runAnimation();
        observer.disconnect(); // only trigger once on scroll-in
      }
    });
  }, { threshold: 0.15 });

  observer.observe(document.getElementById('sqlOrderFlow'));

  // Replay button
  document.getElementById('replayBtn').addEventListener('click', runAnimation);
})();
</script>

</body>
</html>
