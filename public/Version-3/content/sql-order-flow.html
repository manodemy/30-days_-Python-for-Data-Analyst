<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SQL Execution Order — Animated Flow</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background: #080e1c;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
  font-family: 'Inter', sans-serif;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LAYOUT
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.flow-diagram {
  width: 100%;
  max-width: 660px;
}

.flow-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: start;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   COLUMN CARD
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.flow-col {
  background: rgba(13, 20, 40, 0.85);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.45);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HEADER
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.flow-header {
  padding: 15px 18px;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.flow-header.vis { opacity: 1; transform: none; }

.flow-header--blue  { background: linear-gradient(120deg,#1e40af,#2563eb); }
.flow-header--teal  { background: linear-gradient(120deg,#0f766e,#0d9488); }

.hdr-icon { font-size: 1.1rem; flex-shrink: 0; }
.hdr-text { display: flex; flex-direction: column; gap: 1px; }
.hdr-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.69rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.07em;
  text-transform: uppercase;
}
.hdr-sub {
  font-size: 0.58rem;
  color: rgba(255,255,255,0.65);
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   NODE BODY
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.flow-body {
  padding: 16px 14px 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   NODE BOX
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.fnode {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.11);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  font-weight: 600;
  color: #94a3b8;
  text-align: center;
  letter-spacing: 0.04em;
  /* hidden initially */
  opacity: 0;
  transform: translateY(-8px);
  transition: opacity 0.38s ease, transform 0.38s ease,
              box-shadow 0.3s ease, border-color 0.3s ease, color 0.3s ease;
}
.fnode.vis { opacity: 1; transform: none; }

/* dashed (SELECT in writing order) */
.fnode--dash {
  border-style: dashed;
  border-color: rgba(255,255,255,0.18);
}

/* blue highlight */
.fnode--blue {
  border-color: #3b82f6;
  color: #93c5fd;
  background: rgba(59,130,246,0.08);
}
.fnode--blue.vis {
  animation: pulseBlue 2.6s ease-in-out infinite;
}

/* green highlight */
.fnode--green {
  border-color: #10b981;
  color: #6ee7b7;
  background: rgba(16,185,129,0.08);
}
.fnode--green.vis {
  animation: pulseGreen 2.6s ease-in-out infinite;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CONNECTOR
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.fconn {
  position: relative;
  height: 46px;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  opacity: 0;
  transition: opacity 0.32s ease;
  overflow: visible;
}
.fconn.vis { opacity: 1; }

/* SVG inside connector */
.fconn svg {
  width: 24px;
  height: 46px;
  overflow: visible;
}

/* static line */
.c-stem {
  stroke: rgba(71,85,105,0.6);
  stroke-width: 1.6;
  stroke-linecap: round;
}

/* arrowhead ring */
.c-ring {
  fill: rgba(8,14,28,0.95);
  stroke: rgba(71,85,105,0.6);
  stroke-width: 1.5;
}

/* chevron inside ring */
.c-chev {
  stroke: #64748b;
  stroke-width: 1.5;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MOVING DOT
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.c-dot {
  /* dot starts at top of stem */
  transform: translateY(0px);
  transform-box: fill-box;
  transform-origin: center top;
  /* paused until flow-active */
  animation: dotTravel 1.35s cubic-bezier(0.4,0,0.6,1) infinite;
  animation-play-state: paused;
  opacity: 0;
  filter: blur(0px);
}

/* activate dots when column is live */
.flow-col.flow-active .c-dot {
  animation-play-state: running;
}

/* left col = cyan dot */
.flow-col--write .c-dot { fill: #38bdf8; filter: drop-shadow(0 0 3px rgba(56,189,248,0.8)); }
/* right col = teal dot */
.flow-col--exec  .c-dot { fill: #34d399; filter: drop-shadow(0 0 3px rgba(52,211,153,0.8)); }

/* dot travel animation — moves from cy=2 to cy=28 along the stem */
@keyframes dotTravel {
  0%   { transform: translateY(0px);  opacity: 0; }
  7%   { opacity: 1; }
  86%  { opacity: 1; }
  100% { transform: translateY(28px); opacity: 0; }
}

/* stagger dots per connector index */
.fconn[data-di="0"] .c-dot { animation-delay: 0.00s; }
.fconn[data-di="1"] .c-dot { animation-delay: 0.18s; }
.fconn[data-di="2"] .c-dot { animation-delay: 0.36s; }
.fconn[data-di="3"] .c-dot { animation-delay: 0.54s; }
.fconn[data-di="4"] .c-dot { animation-delay: 0.72s; }
.fconn[data-di="5"] .c-dot { animation-delay: 0.90s; }
.fconn[data-di="6"] .c-dot { animation-delay: 1.08s; }

/* also update ring/stem color when active */
.flow-col--write.flow-active .c-ring  { stroke: rgba(56,189,248,0.45); }
.flow-col--write.flow-active .c-chev  { stroke: #38bdf8; }
.flow-col--exec.flow-active  .c-ring  { stroke: rgba(52,211,153,0.45); }
.flow-col--exec.flow-active  .c-chev  { stroke: #34d399; }
.c-ring, .c-chev { transition: stroke 0.5s ease; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   GLOW KEYFRAMES
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@keyframes pulseBlue {
  0%,100% {
    box-shadow: 0 0 8px rgba(59,130,246,0.25);
    border-color: #3b82f6;
  }
  50% {
    box-shadow: 0 0 20px rgba(59,130,246,0.6), 0 0 40px rgba(59,130,246,0.15);
    border-color: #60a5fa;
  }
}
@keyframes pulseGreen {
  0%,100% {
    box-shadow: 0 0 8px rgba(16,185,129,0.25);
    border-color: #10b981;
  }
  50% {
    box-shadow: 0 0 20px rgba(16,185,129,0.6), 0 0 40px rgba(16,185,129,0.15);
    border-color: #34d399;
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   REPLAY BUTTON
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.flow-controls {
  margin-top: 22px;
  display: flex;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.flow-controls.vis { opacity: 1; }

.btn-replay {
  background: transparent;
  border: 1px solid rgba(56,189,248,0.35);
  border-radius: 8px;
  color: #38bdf8;
  font-family: 'Inter', sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 8px 22px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s, transform 0.15s;
}
.btn-replay:hover {
  background: rgba(56,189,248,0.1);
  border-color: rgba(56,189,248,0.6);
  transform: translateY(-1px);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MOBILE
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media (max-width: 520px) {
  .flow-grid { grid-template-columns: 1fr; gap: 16px; }
  .fnode { font-size: 0.62rem; }
  .hdr-title { font-size: 0.62rem; }
}
</style>
</head>
<body>

<!-- Helper: builds a connector SVG with moving dot -->
<template id="tpl-conn">
  <svg width="24" height="46" viewBox="0 0 24 46" xmlns="http://www.w3.org/2000/svg">
    <!-- stem line -->
    <line x1="12" y1="0" x2="12" y2="28" class="c-stem"/>
    <!-- arrowhead ring -->
    <circle cx="12" cy="37" r="7" class="c-ring"/>
    <!-- chevron -->
    <polyline points="9.5,34.5 12,38.5 14.5,34.5" class="c-chev"/>
    <!-- moving dot -->
    <circle cx="12" cy="2" r="3" class="c-dot"/>
  </svg>
</template>

<div class="flow-diagram" id="flowDiagram">
  <div class="flow-grid">

    <!-- ═══ LEFT: WRITING ORDER ═══ -->
    <div class="flow-col flow-col--write" id="colWrite">
      <div class="flow-header flow-header--blue" id="hdrWrite">
        <span class="hdr-icon">📄</span>
        <div class="hdr-text">
          <span class="hdr-title">Writing Order</span>
          <span class="hdr-sub">Syntax</span>
        </div>
      </div>
      <div class="flow-body" id="bodyWrite">
        <div class="fnode fnode--dash" data-ni="0">SELECT</div>
        <div class="fconn" data-fi="0" data-di="0"></div>
        <div class="fnode" data-ni="1">FROM</div>
        <div class="fconn" data-fi="1" data-di="1"></div>
        <div class="fnode" data-ni="2">WHERE</div>
        <div class="fconn" data-fi="2" data-di="2"></div>
        <div class="fnode" data-ni="3">GROUP BY</div>
        <div class="fconn" data-fi="3" data-di="3"></div>
        <div class="fnode" data-ni="4">HAVING</div>
        <div class="fconn" data-fi="4" data-di="4"></div>
        <div class="fnode" data-ni="5">ORDER BY</div>
        <div class="fconn" data-fi="5" data-di="5"></div>
        <div class="fnode" data-ni="6">LIMIT</div>
      </div>
    </div>

    <!-- ═══ RIGHT: EXECUTION ORDER ═══ -->
    <div class="flow-col flow-col--exec" id="colExec">
      <div class="flow-header flow-header--teal" id="hdrExec">
        <span class="hdr-icon">⚙️</span>
        <div class="hdr-text">
          <span class="hdr-title">Execution Order</span>
          <span class="hdr-sub">Logical</span>
        </div>
      </div>
      <div class="flow-body" id="bodyExec">
        <div class="fnode" data-ni="0">1. FROM / JOIN</div>
        <div class="fconn" data-fi="0" data-di="0"></div>
        <div class="fnode" data-ni="1">2. WHERE</div>
        <div class="fconn" data-fi="1" data-di="1"></div>
        <div class="fnode" data-ni="2">3. GROUP BY</div>
        <div class="fconn" data-fi="2" data-di="2"></div>
        <div class="fnode" data-ni="3">4. HAVING</div>
        <div class="fconn" data-fi="3" data-di="3"></div>
        <div class="fnode fnode--blue" data-ni="4">5. SELECT&nbsp;<small style="font-size:0.58em;opacity:0.8;">(alias defined)</small></div>
        <div class="fconn" data-fi="4" data-di="4"></div>
        <div class="fnode" data-ni="5">6. DISTINCT</div>
        <div class="fconn" data-fi="5" data-di="5"></div>
        <div class="fnode fnode--green" data-ni="6">7. ORDER BY&nbsp;<small style="font-size:0.58em;opacity:0.8;">(alias ok)</small></div>
        <div class="fconn" data-fi="6" data-di="6"></div>
        <div class="fnode" data-ni="7">8. LIMIT</div>
      </div>
    </div>

  </div>

  <div class="flow-controls" id="flowControls">
    <button class="btn-replay" id="btnReplay">↺ &nbsp;Replay</button>
  </div>
</div>

<script>
(function () {
  /* ── Inject connector SVGs ── */
  const tpl = document.getElementById('tpl-conn');
  document.querySelectorAll('.fconn').forEach(el => {
    el.appendChild(tpl.content.cloneNode(true));
  });

  /* ── Timing config ── */
  const NODE_STEP  = 280;  // ms between successive node reveals
  const CONN_LAG   = 100;  // ms after node before connector appears
  const HDR_DELAY  = 100;  // ms before headers appear

  /* ── Selectors ── */
  const hdrWrite   = document.getElementById('hdrWrite');
  const hdrExec    = document.getElementById('hdrExec');
  const colWrite   = document.getElementById('colWrite');
  const colExec    = document.getElementById('colExec');
  const controls   = document.getElementById('flowControls');
  const btnReplay  = document.getElementById('btnReplay');

  const writeNodes = [...document.querySelectorAll('#bodyWrite .fnode')];
  const writeConns = [...document.querySelectorAll('#bodyWrite .fconn')];
  const execNodes  = [...document.querySelectorAll('#bodyExec  .fnode')];
  const execConns  = [...document.querySelectorAll('#bodyExec  .fconn')];

  /* ── Reset everything ── */
  function reset() {
    [hdrWrite, hdrExec].forEach(el => el.classList.remove('vis'));
    colWrite.classList.remove('flow-active');
    colExec.classList.remove('flow-active');
    controls.classList.remove('vis');
    [...writeNodes, ...writeConns, ...execNodes, ...execConns]
      .forEach(el => el.classList.remove('vis'));
  }

  /* ── Run animation ── */
  function run() {
    reset();
    const timers = [];

    /* headers */
    timers.push(setTimeout(() => {
      hdrWrite.classList.add('vis');
      hdrExec.classList.add('vis');
    }, HDR_DELAY));

    /* stagger left column nodes + connectors */
    writeNodes.forEach((node, i) => {
      const t = 400 + i * NODE_STEP;
      timers.push(setTimeout(() => node.classList.add('vis'), t));
      if (writeConns[i]) {
        timers.push(setTimeout(() => writeConns[i].classList.add('vis'), t + CONN_LAG));
      }
    });

    /* stagger right column — slightly offset so both feel alive simultaneously */
    execNodes.forEach((node, i) => {
      const t = 520 + i * NODE_STEP;
      timers.push(setTimeout(() => node.classList.add('vis'), t));
      if (execConns[i]) {
        timers.push(setTimeout(() => execConns[i].classList.add('vis'), t + CONN_LAG));
      }
    });

    /* activate moving dots after all nodes appear */
    const maxT = 520 + (execNodes.length - 1) * NODE_STEP + CONN_LAG + 350;
    timers.push(setTimeout(() => {
      colWrite.classList.add('flow-active');
      colExec.classList.add('flow-active');
    }, maxT));

    /* show replay button */
    timers.push(setTimeout(() => controls.classList.add('vis'), maxT + 250));
  }

  /* ── IntersectionObserver: auto-start on scroll-into-view ── */
  const io = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) { run(); io.disconnect(); }
  }, { threshold: 0.15 });
  io.observe(document.getElementById('flowDiagram'));

  /* ── Replay button ── */
  btnReplay.addEventListener('click', run);
})();
</script>

</body>
</html>
