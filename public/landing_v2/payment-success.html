  <script src="../supabase.js"></script>

  <script>

    const params = new URLSearchParams(window.location.search);

    const oid = params.get('order_id');

    if (oid) {

      document.getElementById('orderId').textContent = 'Order ID: ' + oid;

    } else {

      document.getElementById('orderId').textContent = 'Lifetime Access Key Active';

    }

    // Google Ads Purchase Conversion Tracking
    if (typeof gtag === 'function') {
      gtag('event', 'conversion', {
        'send_to': 'AW-18220099107/r8JqCLv277scEKPMgvBD',
        'transaction_id': oid || ''
      });
    }



    // Verify enrollment with Supabase

    const SUPA_URL = 'https://erqoyvbuhmkyvcqgwcbz.supabase.co';

    const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVycW95dmJ1aG1reXZjcWd3Y2J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODk1MTIsImV4cCI6MjA5NDk2NTUxMn0.9UnIfq8xMrKANPPTtoOADKH-NJ_it9HDp7xrJL4FXtw';

    try {

      const CustomAuthStorage = {
          getItem: (key) => {
            let val = null;
            const match = document.cookie.match(new RegExp('(^| )' + key + '=([^;]+)'));
            if (match) {
              try { val = decodeURIComponent(match[2]); } catch (e) {}
            }
            if (!val) {
              let chunks = [];
              for (let i = 0; ; i++) {
                const chunkMatch = document.cookie.match(new RegExp('(^| )' + key + '\.' + i + '=([^;]+)'));
                if (chunkMatch) {
                  try { chunks.push(decodeURIComponent(chunkMatch[2])); } catch (e) { break; }
                } else {
                  break;
                }
              }
              if (chunks.length > 0) {
                val = chunks.join('');
              }
            }
            if (!val) {
              try { val = localStorage.getItem(key); } catch (e) {}
            }
            if (val) {
              try { localStorage.setItem(key, val); } catch (e) {}
              if (!document.cookie.includes(key)) {
                CustomAuthStorage.setItem(key, val);
              }
            }
            return val;
          },
          setItem: (key, value) => {
            try { localStorage.setItem(key, value); } catch (e) {}
            document.cookie = `${key}=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT; secure; samesite=lax`;
            for (let i = 0; i < 10; i++) {
              document.cookie = `${key}.${i}=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT; secure; samesite=lax`;
            }
            const encodedValue = encodeURIComponent(value);
            const MAX_CHUNK_SIZE = 3000;
            if (encodedValue.length <= MAX_CHUNK_SIZE) {
              try {
                document.cookie = `${key}=${encodedValue}; path=/; max-age=604800; secure; samesite=lax`;
              } catch (e) {}
            } else {
              let offset = 0;
              let chunkIndex = 0;
              while (offset < encodedValue.length) {
                const chunk = encodedValue.slice(offset, offset + MAX_CHUNK_SIZE);
                try {
                  document.cookie = `${key}.${chunkIndex}=${chunk}; path=/; max-age=604800; secure; samesite=lax`;
                } catch (e) {}
                offset += MAX_CHUNK_SIZE;
                chunkIndex++;
              }
            }
          },
          removeItem: (key) => {
            try { localStorage.removeItem(key); } catch (e) {}
            document.cookie = `${key}=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT; secure; samesite=lax`;
            for (let i = 0; i < 10; i++) {
              document.cookie = `${key}.${i}=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT; secure; samesite=lax`;
            }
          }
        };

      const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
        auth: {
          storage: CustomAuthStorage
        }
      });

      sb.rpc('check_enrollment', { p_course_id: 'python-30day' }).then(({ data }) => {
        if (data === true) {
          localStorage.setItem('manodemy_auth', 'true');
          localStorage.setItem('manodemy_enrolled', 'true');
          
          // Fetch cohort batch preference from enrollments
          sb.auth.getSession().then(({ data: { session } }) => {
            if (session && session.user) {
              sb.from('enrollments')
                .select('batch_id')
                .eq('user_id', session.user.id)
                .eq('course_id', 'python-30day')
                .maybeSingle()
                .then(({ data: enroll }) => {
                  if (enroll && enroll.batch_id) {
                    localStorage.setItem('manodemy_selected_batch', enroll.batch_id);
                    
                    const infoBlock = document.createElement('div');
                    infoBlock.style.margin = '20px auto';
                    infoBlock.style.padding = '12px 16px';
                    infoBlock.style.background = 'rgba(0, 180, 216, 0.08)';
                    infoBlock.style.border = '1.5px solid #00B4D8';
                    infoBlock.style.borderRadius = '8px';
                    infoBlock.style.textAlign = 'center';
                    infoBlock.style.maxWidth = '380px';
                    
                    const batchText = enroll.batch_id === 'batch-1'
                      ? '🌅 Batch 1: Daily Cohort (7:30 PM - 8:30 PM IST)'
                      : '🌃 Batch 2: Daily Cohort (8:30 PM - 9:30 PM IST)';
                      
                    infoBlock.innerHTML = `
                      <span style="font-size: 13px; font-weight: 600; color: #0F172A; display: block; margin-bottom: 4px;">🎯 Enrolled Cohort Batch:</span>
                      <span style="font-size: 14px; font-weight: 700; color: #00B4D8;">${batchText}</span>
                    `;
                    
                    const card = document.querySelector('.status-card');
                    const cta = document.querySelector('.btn-action');
                    if (card && cta) {
                      card.insertBefore(infoBlock, cta);
                    }
                  }
                });
            }
          });
        }
      }).catch(e => console.error(e));

    } catch(err) {

      console.warn("Supabase initialization bypassed safely:", err);

    }

  </script>
