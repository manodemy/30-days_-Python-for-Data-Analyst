<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password — Manodemy</title>

<link rel="icon" href="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="landing.css?v=7.0">

<script src="supabase.js"></script>

</head>

<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:var(--bg);">



<div class="landing-login-card" style="margin:2rem;">

  <h3 class="login-title" style="text-align:center;">Set New Password</h3>

  <p style="color:#94A3B8;font-size:0.85rem;text-align:center;margin:0 0 1.2rem;">Enter a new secure password below.</p>

  <div id="authMessage" style="display:none;padding:0.6rem;border-radius:8px;font-size:0.85rem;text-align:center;margin-bottom:0.8rem;"></div>

  <form id="resetPasswordForm" class="landing-login-form" style="display:flex;flex-direction:column;gap:0.8rem;">

    <input type="password" id="newPassword" placeholder="New Password" class="landing-input" required minlength="6">

    <input type="password" id="confirmNewPassword" placeholder="Confirm Password" class="landing-input" required minlength="6">

    <button type="submit" class="landing-submit-btn" id="btnResetSubmit">Update Password</button>

  </form>

  <div class="landing-footer-links" style="margin-top:1rem;">

    <a href="index.html">← Back to Login</a>

  </div>

</div>



<script>

  const SUPABASE_URL = 'https://erqoyvbuhmkyvcqgwcbz.supabase.co';

  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVycW95dmJ1aG1reXZjcWd3Y2J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODk1MTIsImV4cCI6MjA5NDk2NTUxMn0.9UnIfq8xMrKANPPTtoOADKH-NJ_it9HDp7xrJL4FXtw';

  const CustomAuthStorage = {
    getItem: (key) => {
      let val = null;
      const match = document.cookie.match(new RegExp('(^| )' + key + '=([^;]+)'));
      if (match) {
        try { val = decodeURIComponent(match[2]); } catch (e) {}
      }
      if (!val) {
        try { val = localStorage.getItem(key); } catch (e) {}
      }
      if (val) {
        try { document.cookie = `${key}=${encodeURIComponent(val)}; path=/; max-age=604800; secure; samesite=lax`; } catch (e) {}
        try { localStorage.setItem(key, val); } catch (e) {}
      }
      return val;
    },
    setItem: (key, value) => {
      try { document.cookie = `${key}=${encodeURIComponent(value)}; path=/; max-age=604800; secure; samesite=lax`; } catch (e) {}
      try { localStorage.setItem(key, value); } catch (e) {}
    },
    removeItem: (key) => {
      try { document.cookie = `${key}=; path=/; max-age=0; secure; samesite=lax`; } catch (e) {}
      try { localStorage.removeItem(key); } catch (e) {}
    }
  };

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      storage: CustomAuthStorage
    }
  });



  const form = document.getElementById('resetPasswordForm');

  const btn = document.getElementById('btnResetSubmit');

  const msgEl = document.getElementById('authMessage');



  const showMsg = (msg, type) => {

    msgEl.textContent = msg;

    msgEl.style.display = 'block';

    if (type === 'error') {

      msgEl.style.background = 'rgba(244, 63, 94, 0.15)';

      msgEl.style.color = '#F43F5E';

      msgEl.style.border = '1px solid rgba(244, 63, 94, 0.3)';

    } else if (type === 'success') {

      msgEl.style.background = 'rgba(16, 185, 129, 0.15)';

      msgEl.style.color = '#10B981';

      msgEl.style.border = '1px solid rgba(16, 185, 129, 0.3)';

    } else {

      msgEl.style.background = 'rgba(0, 230, 246, 0.1)';

      msgEl.style.color = '#00E6F6';

      msgEl.style.border = '1px solid rgba(0, 230, 246, 0.2)';

    }

  };



  // Listen for the PASSWORD_RECOVERY event from the magic link

  sb.auth.onAuthStateChange((event, session) => {

    if (event === 'PASSWORD_RECOVERY') {

      showMsg('Please set a new password.', 'info');

    }

  });



  form.addEventListener('submit', async (e) => {

    e.preventDefault();

    const p1 = document.getElementById('newPassword').value;

    const p2 = document.getElementById('confirmNewPassword').value;



    if (p1 !== p2) { showMsg("Passwords do not match.", "error"); return; }

    if (p1.length < 6) { showMsg("Password must be at least 6 characters.", "error"); return; }



    btn.disabled = true;

    btn.textContent = 'Updating...';



    const { error } = await sb.auth.updateUser({ password: p1 });



    if (error) {

      showMsg(error.message, "error");

      btn.disabled = false;

      btn.textContent = 'Update Password';

    } else {

      showMsg("Password updated successfully! Redirecting...", "success");

      setTimeout(() => { window.location.href = 'index.html'; }, 2000);

    }

  });

</script>

</body>

</html>
